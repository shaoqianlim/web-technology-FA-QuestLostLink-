<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quest LostLink — All Items</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <header class="hdr">
    <a class="logo" href="index.html">Quest <span>LostLink</span></a>
    <nav class="hdr-nav">
      <a class="navbtn" href="index.html">Home</a>
      <a class="navbtn on" href="items.html">All Items</a>
      <a class="navbtn" href="lost.html">Lost</a>
      <a class="navbtn" href="found.html">Found</a>
      <a class="navbtn cta" href="report.html">+ Report Item</a>
    </nav>
    <button class="hmbg" id="hmbg" aria-label="Open menu" aria-expanded="false"><span></span><span></span><span></span></button>
  </header>
  <div class="mob-nav" id="mobNav">
    <a class="navbtn" href="index.html">🏠 Home</a>
    <a class="navbtn" href="items.html">📋 All Items</a>
    <a class="navbtn" href="lost.html">🔴 Lost Items</a>
    <a class="navbtn" href="found.html">🟢 Found Items</a>
    <a class="cta-mob" href="report.html">+ Report Item</a>
  </div>
  <main class="wrap">
    <div class="page-title-bar">
      <div><h1 class="page-heading">All Items</h1><p class="page-subheading">Browse every lost and found report on campus</p></div>
      <a class="btn btn-p" href="report.html">+ Report Item</a>
    </div>
    <div class="page-tabs">
      <a class="ptab on" href="items.html">All</a>
      <a class="ptab" href="lost.html"><span style="color:var(--lost)">●</span> Lost</a>
      <a class="ptab" href="found.html"><span style="color:var(--found)">●</span> Found</a>
    </div>
    <div class="fbar">
      <div class="sw">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" id="srch" placeholder="Search title, location, description…" maxlength="100"/>
      </div>
      <select id="statusF"><option value="">All Statuses</option><option value="active">Active</option><option value="claimed">Claimed</option><option value="resolved">Resolved</option></select>
      <select id="catF"><option value="">All Categories</option><option>Electronics</option><option>Clothing</option><option>Books &amp; Stationery</option><option>ID / Cards</option><option>Keys</option><option>Bags &amp; Wallets</option><option>Jewellery</option><option>Other</option></select>
      <select id="sortF"><option value="newest">Newest First</option><option value="oldest">Oldest First</option><option value="az">A → Z</option></select>
    </div>
    <div class="sec-hdr"><h2 class="sec-title">Results <span class="count-pill" id="cnt">0</span></h2></div>
    <div class="grid" id="grd" role="list"></div>
  </main>
  <div class="overlay" id="detOv" role="dialog" aria-modal="true" aria-labelledby="detTitle">
    <div class="modal"><div class="mhdr"><h2 class="modal-title" id="detTitle">Item Details</h2><button class="xbtn" id="detClose">✕</button></div><div id="detBody"></div></div>
  </div>
  <footer><div class="fl">Quest <span>LostLink</span></div><div>Quest International University &copy; 2025</div></footer>
  <div id="tc" role="status" aria-live="polite"></div>
  <script src="js/api.js" defer></script>
  <script src="js/ui.js" defer></script>
  <script src="js/nav.js"></script>
  <script src="js/items.js" defer></script>
</body>
</html>
